<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progress Report - FinVerse</title>
<link rel="stylesheet" href="style.css">
<style>
.report-hero {
  background: var(--bg-card);
  border: 2px solid rgba(0,255,178,0.3);
  border-radius: 25px;
  padding: 30px 20px;
  margin-bottom: 25px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.report-hero::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(0,255,178,0.1) 0%, transparent 60%);
  animation: rotate 20s linear infinite;
}
@keyframes rotate { to { transform: rotate(360deg); } }
.report-hero-content { position: relative; z-index: 1; }
.mega-grade {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  margin: 20px auto;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3.5rem;
  font-weight: 800;
  background: rgba(0,0,0,0.4);
  border: 4px solid;
  box-shadow: 0 0 40px;
}
.mega-score {
  font-size: 3rem;
  font-weight: 800;
  background: var(--gradient-1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.mega-label {
  color: #94a3b8;
  font-size: 1rem;
  margin-top: 5px;
}
.stat-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin: 20px 0;
}
.mini-stat {
  background: rgba(0,0,0,0.3);
  padding: 15px 8px;
  border-radius: 12px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.05);
}
.mini-stat-num {
  font-size: 1.5rem;
  font-weight: 800;
  background: var(--gradient-1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.mini-stat-label {
  font-size: 0.75rem;
  color: #94a3b8;
  margin-top: 5px;
}
.skill-card {
  background: var(--bg-card);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 18px;
  padding: 20px;
  margin-bottom: 15px;
  transition: all 0.3s;
}
.skill-card:hover { transform: translateX(5px); border-color: rgba(0,255,178,0.3); }
.skill-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.skill-title { font-size: 1.05rem; font-weight: 700; }
.skill-grade {
  padding: 4px 12px;
  border-radius: 15px;
  font-size: 0.85rem;
  font-weight: 700;
}
.skill-progress {
  height: 10px;
  background: rgba(255,255,255,0.08);
  border-radius: 10px;
  overflow: hidden;
  margin: 10px 0;
}
.skill-fill {
  height: 100%;
  border-radius: 10px;
  transition: width 1s ease;
  position: relative;
  overflow: hidden;
}
.skill-fill::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: shimmer 2s infinite;
}
@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}
.skill-meta {
  display: flex;
  justify-content: space-between;
  font-size: 0.85rem;
  color: #94a3b8;
}
.recommendations {
  background: rgba(59,130,246,0.08);
  border: 1px solid rgba(59,130,246,0.3);
  border-radius: 18px;
  padding: 20px;
  margin: 20px 0;
}
.recommendations h2 {
  color: #3b82f6;
  margin-bottom: 15px;
  font-size: 1.2rem;
}
.rec-item {
  background: rgba(0,0,0,0.2);
  padding: 12px 15px;
  border-radius: 10px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.badges-section {
  background: var(--bg-card);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 20px;
  margin: 20px 0;
}
.badges-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-top: 15px;
}
.badge-item {
  text-align: center;
  padding: 15px 8px;
  background: rgba(0,0,0,0.3);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.05);
  transition: all 0.3s;
}
.badge-item.earned {
  border-color: rgba(0,255,178,0.4);
  background: rgba(0,255,178,0.05);
}
.badge-item.locked { opacity: 0.4; }
.badge-emoji { font-size: 2rem; }
.badge-name {
  font-size: 0.7rem;
  color: #94a3b8;
  margin-top: 5px;
}
.detail-questions {
  background: var(--bg-card);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 18px;
  padding: 20px;
  margin: 20px 0;
}
.detail-questions h2 { color: #00ffb2; margin-bottom: 15px; }
.q-review {
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex;
  gap: 10px;
  align-items: start;
}
.q-review:last-child { border-bottom: none; }
.q-icon { font-size: 1.2rem; flex-shrink: 0; }
.q-review-text { flex: 1; color: #94a3b8; font-size: 0.9rem; }
</style>
</head>
<body>

<nav class="navbar">
  <div class="logo" onclick="location.href='index.html'">₹ FinVerse</div>
  <div class="nav-buttons">
    <a href="modules.html" class="btn btn-outline">Modules</a>
  </div>
</nav>

<div class="container">

  <div class="page-header">
    <button class="back-btn" onclick="history.back()">←</button>
    <h1 class="page-title" id="reportTitle">📊 Progress Report</h1>
  </div>

  <div id="reportContent"></div>

</div>

<footer class="footer">
  <div class="footer-logo">₹ FinVerse</div>
  <div class="footer-tagline">Learn. Practice. Earn. Lead.</div>
  <div class="footer-links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="modules.html">Modules</a>
    <a href="pricing.html">Pricing</a>
    <a href="simulators.html">Simulators</a>
  </div>
  <div class="copyright">© 2026 FinVerse. All Rights Reserved.</div>
</footer>

<script src="script.js"></script>
<script>
const moduleId = getURLParam('id');
const allResults = getAllResults();

if (moduleId && QUIZZES[moduleId]) {
  showModuleReport(moduleId);
} else {
  showOverallReport();
}

function showModuleReport(id) {
  const quiz = QUIZZES[id];
  const result = getQuizResult(id);
  
  document.getElementById('reportTitle').innerHTML = quiz.icon + ' ' + quiz.title + ' Report';
  
  if (!result) {
    document.getElementById('reportContent').innerHTML = `
      <div class="report-hero">
        <div class="report-hero-content">
          <div style="font-size:4rem;">📝</div>
          <h2 style="margin:15px 0;">No Quiz Attempted Yet</h2>
          <p style="color:#94a3b8; margin-bottom:20px;">Take the quiz to see your detailed progress report!</p>
          <a href="quiz.html?id=${id}" class="btn btn-primary btn-large">Start Quiz Now</a>
        </div>
      </div>
    `;
    return;
  }
  
  const percent = Math.round((result.score / result.total) * 100);
  const grade = getGrade(percent);
  const date = new Date(result.date).toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'});
  
  document.getElementById('reportContent').innerHTML = `
    <div class="report-hero">
      <div class="report-hero-content">
        <div class="mega-grade" style="border-color:${grade.color}; color:${grade.color}; box-shadow:0 0 40px ${grade.color}40;">
          ${grade.grade}
        </div>
        <div class="mega-score">${result.score}/${result.total}</div>
        <div class="mega-label">${percent}% • ${grade.label}</div>
        <div style="margin-top:15px; color:#94a3b8; font-size:0.85rem;">📅 Attempted: ${date}</div>
      </div>
    </div>
    
    <div class="stat-cards">
      <div class="mini-stat">
        <div class="mini-stat-num" style="color:#22c55e;">${result.score}</div>
        <div class="mini-stat-label">Correct</div>
      </div>
      <div class="mini-stat">
        <div class="mini-stat-num" style="color:#ef4444;">${result.total - result.score}</div>
        <div class="mini-stat-label">Wrong</div>
      </div>
      <div class="mini-stat">
        <div class="mini-stat-num">${percent}%</div>
        <div class="mini-stat-label">Accuracy</div>
      </div>
    </div>
    
    <div class="recommendations">
      <h2>💡 Personalized Recommendations</h2>
      ${percent >= 90 ? `
        <div class="rec-item">🏆 <span>Amazing! You've mastered ${quiz.title}!</span></div>
        <div class="rec-item">🚀 <span>Try our advanced simulators to apply knowledge</span></div>
        <div class="rec-item">📚 <span>Move to the next module to expand your skills</span></div>
      ` : percent >= 70 ? `
        <div class="rec-item">👍 <span>Great work! Review a few concepts to reach mastery</span></div>
        <div class="rec-item">🎮 <span>Practice with related simulators</span></div>
        <div class="rec-item">🔄 <span>Retake quiz to score above 90%</span></div>
      ` : `
        <div class="rec-item">📖 <span>Re-read the module lessons carefully</span></div>
        <div class="rec-item">💡 <span>${quiz.improve}</span></div>
        <div class="rec-item">🔄 <span>Retake the quiz after studying</span></div>
        <div class="rec-item">🎮 <span>Use simulators to reinforce learning</span></div>
      `}
    </div>
    
    <div class="badges-section">
      <h2 style="color:#00ffb2; margin-bottom:5px;">🏅 Achievements</h2>
      <p style="color:#94a3b8; font-size:0.85rem;">Badges earned from this module</p>
      <div class="badges-grid">
        <div class="badge-item ${percent >= 50 ? 'earned' : 'locked'}">
          <div class="badge-emoji">🎯</div>
          <div class="badge-name">First Try</div>
        </div>
        <div class="badge-item ${percent >= 70 ? 'earned' : 'locked'}">
          <div class="badge-emoji">⭐</div>
          <div class="badge-name">Scholar</div>
        </div>
        <div class="badge-item ${percent >= 90 ? 'earned' : 'locked'}">
          <div class="badge-emoji">🏆</div>
          <div class="badge-name">Master</div>
        </div>
        <div class="badge-item ${percent === 100 ? 'earned' : 'locked'}">
          <div class="badge-emoji">💎</div>
          <div class="badge-name">Perfect</div>
        </div>
      </div>
    </div>
    
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:20px 0;">
      <a href="quiz.html?id=${id}" class="btn btn-outline btn-large">🔄 Retake Quiz</a>
      <a href="module.html?id=${id}" class="btn btn-primary btn-large">📚 Review Module</a>
    </div>
    
    <div style="text-align:center; margin-top:20px;">
      <a href="progress.html" class="btn btn-outline">📊 View Overall Progress</a>
    </div>
  `;
}

function showOverallReport() {
  document.getElementById('reportTitle').textContent = '📊 Overall Progress Report';
  
  const moduleIds = Object.keys(QUIZZES);
  const attempted = moduleIds.filter(id => allResults[id]);
  const totalScore = attempted.reduce((sum, id) => sum + allResults[id].score, 0);
  const totalPossible = attempted.reduce((sum, id) => sum + allResults[id].total, 0);
  const overallPercent = totalPossible > 0 ? Math.round((totalScore / totalPossible) * 100) : 0;
  const overallGrade = getGrade(overallPercent);
  const completionPercent = Math.round((attempted.length / moduleIds.length) * 100);
  
  let skillsHTML = '';
  moduleIds.forEach(id => {
    const quiz = QUIZZES[id];
    const result = allResults[id];
    if (result) {
      const p = Math.round((result.score / result.total) * 100);
      const g = getGrade(p);
      skillsHTML += `
        <div class="skill-card">
          <div class="skill-header">
            <div class="skill-title">${quiz.icon} ${quiz.title}</div>
            <div class="skill-grade" style="background:${g.color}20; color:${g.color};">${g.grade}</div>
          </div>
          <div class="skill-progress">
            <div class="skill-fill" style="width:${p}%; background:linear-gradient(90deg, ${g.color}, ${g.color}dd);"></div>
          </div>
          <div class="skill-meta">
            <span>${result.score}/${result.total} correct</span>
            <span>${p}%</span>
          </div>
        </div>
      `;
    } else {
      skillsHTML += `
        <div class="skill-card" style="opacity:0.5;">
          <div class="skill-header">
            <div class="skill-title">${quiz.icon} ${quiz.title}</div>
            <div class="skill-grade" style="background:rgba(255,255,255,0.1); color:#94a3b8;">Not Attempted</div>
          </div>
          <div class="skill-progress">
            <div class="skill-fill" style="width:0%;"></div>
          </div>
          <div class="skill-meta">
            <a href="quiz.html?id=${id}" style="color:#00ffb2;">Take Quiz →</a>
          </div>
        </div>
      `;
    }
  });
  
  document.getElementById('reportContent').innerHTML = `
    <div class="report-hero">
      <div class="report-hero-content">
        ${attempted.length > 0 ? `
          <div class="mega-grade" style="border-color:${overallGrade.color}; color:${overallGrade.color}; box-shadow:0 0 40px ${overallGrade.color}40;">
            ${overallGrade.grade}
          </div>
          <div class="mega-score">${totalScore}/${totalPossible}</div>
          <div class="mega-label">${overallPercent}% Overall • ${overallGrade.label}</div>
        ` : `
          <div style="font-size:4rem;">🚀</div>
          <h2 style="margin:15px 0;">Start Your Journey!</h2>
          <p style="color:#94a3b8;">Attempt quizzes to see your progress here</p>
        `}
      </div>
    </div>
    
    <div class="stat-cards">
      <div class="mini-stat">
        <div class="mini-stat-num">${attempted.length}/${moduleIds.length}</div>
        <div class="mini-stat-label">Modules Done</div>
      </div>
      <div class="mini-stat">
        <div class="mini-stat-num">${totalScore}</div>
        <div class="mini-stat-label">Correct Answers</div>
      </div>
      <div class="mini-stat">
        <div class="mini-stat-num">${completionPercent}%</div>
        <div class="mini-stat-label">Completion</div>
      </div>
    </div>
    
    <div class="badges-section">
      <h2 style="color:#00ffb2; margin-bottom:5px;">🏆 Overall Achievements</h2>
      <p style="color:#94a3b8; font-size:0.85rem;">Milestones on your learning journey</p>
      <div class="badges-grid">
        <div class="badge-item ${attempted.length >= 1 ? 'earned' : 'locked'}">
          <div class="badge-emoji">🎯</div>
          <div class="badge-name">Starter</div>
        </div>
        <div class="badge-item ${attempted.length >= 3 ? 'earned' : 'locked'}">
          <div class="badge-emoji">📚</div>
          <div class="badge-name">Learner</div>
        </div>
        <div class="badge-item ${attempted.length === 5 ? 'earned' : 'locked'}">
          <div class="badge-emoji">🌟</div>
          <div class="badge-name">Complete</div>
        </div>
        <div class="badge-item ${overallPercent >= 70 && attempted.length === 5 ? 'earned' : 'locked'}">
          <div class="badge-emoji">🎓</div>
          <div class="badge-name">Certified</div>
        </div>
      </div>
    </div>
    
    <h2 style="color:#00ffb2; margin:25px 0 15px;">📊 Module-wise Performance</h2>
    ${skillsHTML}
    
    ${overallPercent >= 70 && attempted.length === 5 ? `
      <div class="recommendations" style="background:rgba(0,255,178,0.08); border-color:rgba(0,255,178,0.3);">
        <h2 style="color:#00ffb2;">🎓 Certificate Eligible!</h2>
        <p style="color:#fff;">Congratulations! You've completed all modules with 70%+ score. You've earned your FinVerse Basics Certificate!</p>
      </div>
    ` : `
      <div class="recommendations">
        <h2>💡 Next Steps</h2>
        ${attempted.length < 5 ? `<div class="rec-item">📚 <span>Complete all 5 modules to unlock your certificate</span></div>` : ''}
        ${overallPercent < 70 ? `<div class="rec-item">🎯 <span>Score 70%+ overall to earn certification</span></div>` : ''}
        <div class="rec-item">🎮 <span>Practice with our advanced simulators</span></div>
        <div class="rec-item">🔄 <span>Retake quizzes to improve scores</span></div>
      </div>
    `}
    
    <div style="text-align:center; margin-top:25px;">
      <a href="modules.html" class="btn btn-primary btn-large">📚 Continue Learning</a>
    </div>
  `;
}
</script>

</body>
</html>
