<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson - FinVerse</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="logo" onclick="location.href='index.html'">₹ FinVerse</div>
  <div class="nav-buttons">
    <a href="pricing.html" class="btn btn-outline">Login</a>
    <a href="pricing.html" class="btn btn-primary">Get Started</a>
  </div>
</nav>

<div class="container">

  <div class="page-header">
    <button class="back-btn" id="backBtn">←</button>
    <h1 class="page-title" id="lessonTitle">Loading...</h1>
  </div>

  <div class="lesson-content" id="lessonContent"></div>

  <div style="margin: 40px 0;">
    <button class="btn btn-primary btn-full btn-large" id="quizBtn">🎯 Take Quiz</button>
  </div>

</div>

<footer class="footer">
  <div class="footer-logo">₹ FinVerse</div>
  <div class="footer-tagline">Learn. Practice. Earn. Lead.</div>
  <div class="footer-links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="modules.html">Modules</a>
    <a href="pricing.html">Pricing</a>
    <a href="simulators.html">Simulators</a>
  </div>
  <div class="copyright">© 2026 FinVerse. All Rights Reserved.</div>
</footer>

<script src="script.js"></script>
<script>
const lessonId = getURLParam('id') || 'money';
const lesson = LESSONS[lessonId];

if (lesson) {
  document.title = lesson.title + ' - FinVerse';
  document.getElementById('lessonTitle').textContent = lesson.title;
  document.getElementById('backBtn').onclick = () => location.href = 'module.html?id=' + lesson.module;
  document.getElementById('quizBtn').onclick = () => location.href = 'quiz.html?id=' + lesson.module;
  
  let html = `<h2>Introduction</h2><p>${lesson.intro}</p>`;
  
  lesson.sections.forEach(section => {
    html += `<h2>${section.heading}</h2>`;
    if (section.type === 'list') {
      html += '<ul>';
      section.items.forEach(item => {
        html += `<li>${item}</li>`;
      });
      html += '</ul>';
    } else if (section.type === 'text') {
      html += `<p>${section.content}</p>`;
    }
  });
  
  html += `<div class="indian-example"><p>${lesson.example}</p></div>`;
  
  html += `<div class="takeaways"><h3>🎯 Key Takeaways:</h3><ul>`;
  lesson.takeaways.forEach(t => {
    html += `<li>${t}</li>`;
  });
  html += `</ul></div>`;
  
  html += `<div class="sources"><h3>📚 Sources & References:</h3><ul>`;
  lesson.sources.forEach(s => {
    html += `<li><a href="${s.url}" target="_blank">${s.name}</a></li>`;
  });
  html += `</ul></div>`;
  
  document.getElementById('lessonContent').innerHTML = html;
} else {
  document.getElementById('lessonContent').innerHTML = '<p>Lesson not found. <a href="modules.html" style="color:#00ffb2;">Go back to modules</a></p>';
}
</script>

</body>
