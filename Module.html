<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module - FinVerse</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="logo" onclick="location.href='index.html'">₹ FinVerse</div>
  <div class="nav-buttons">
    <a href="pricing.html" class="btn btn-outline">Login</a>
    <a href="pricing.html" class="btn btn-primary">Get Started</a>
  </div>
</nav>

<div class="container">

  <div class="page-header">
    <button class="back-btn" onclick="location.href='modules.html'">←</button>
    <h1 class="page-title" id="moduleTitle">Loading...</h1>
  </div>

  <div id="lessonsList"></div>

  <div style="margin: 40px 0;">
    <h2 style="color: #00ffb2; margin-bottom: 20px;">🎯 Quiz Time</h2>
    <button class="btn btn-primary btn-full btn-large" style="margin-bottom: 15px;" id="quizBtn">Attempt Quiz</button>
    <button class="btn btn-outline btn-full btn-large" id="progressBtn">Progress Report</button>
  </div>

  <div style="text-align: center; margin: 40px 0;">
    <a href="simulators.html" class="btn btn-primary btn-large">🎮 Try Simulators</a>
  </div>

</div>

<footer class="footer">
  <div class="footer-logo">₹ FinVerse</div>
  <div class="footer-tagline">Learn. Practice. Earn. Lead.</div>
  <div class="footer-links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="modules.html">Modules</a>
    <a href="pricing.html">Pricing</a>
    <a href="simulators.html">Simulators</a>
  </div>
  <div class="copyright">© 2026 FinVerse. All Rights Reserved.</div>
</footer>

<script src="script.js"></script>
<script>
const moduleId = getURLParam('id') || 'financial';
const module = MODULES[moduleId];

if (module) {
  document.title = module.title + ' - FinVerse';
  document.getElementById('moduleTitle').innerHTML = module.icon + ' ' + module.title;
  
  let lessonsHTML = '';
  module.lessons.forEach(lesson => {
    lessonsHTML += `
      <div class="lesson-card">
        <div class="lesson-title">${lesson.title}</div>
        <div class="lesson-desc">${lesson.desc}</div>
        <a href="lesson.html?id=${lesson.id}" class="read-link">→ Read Lesson</a>
      </div>
    `;
  });
  document.getElementById('lessonsList').innerHTML = lessonsHTML;
  
  document.getElementById('quizBtn').onclick = () => location.href = 'quiz.html?id=' + moduleId;
  document.getElementById('progressBtn').onclick = () => location.href = 'progress.html?id=' + moduleId;
  
  // Apply module color theme
  if (module.color === 'purple') {
    document.querySelectorAll('.lesson-card').forEach(c => c.style.borderLeftColor = '#a78bfa');
    document.querySelectorAll('.read-link').forEach(l => l.style.color = '#a78bfa');
  } else if (module.color === 'orange') {
    document.querySelectorAll('.lesson-card').forEach(c => c.style.borderLeftColor = '#fb923c');
    document.querySelectorAll('.read-link').forEach(l => l.style.color = '#fb923c');
  } else if (module.color === 'red') {
    document.querySelectorAll('.lesson-card').forEach(c => c.style.borderLeftColor = '#ef4444');
    document.querySelectorAll('.read-link').forEach(l => l.style.color = '#ef4444');
  }
}
</script>

</body>
</html>
